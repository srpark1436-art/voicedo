<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- microphone body -->
  <rect x="80" y="44" width="32" height="56" rx="16" fill="url(#mic)"/>
  <!-- microphone arc -->
  <path d="M64 88 v8 a32 32 0 0 0 64 0 v-8" fill="none" stroke="#e0e7ff" stroke-width="5" stroke-linecap="round"/>
  <!-- stand -->
  <line x1="96" y1="128" x2="96" y2="148" stroke="#e0e7ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="80" y1="148" x2="112" y2="148" stroke="#e0e7ff" stroke-width="5" stroke-linecap="round"/>
</svg>
